# Grafana + InfluxDB 1.x (k6 influxdb output)
# Grafana: http://localhost:3001 (host 3001 avoids clashing with apps on 3000)
# InfluxDB: http://localhost:8086 — default DB: k6
#
# Example k6 output:
#   k6 run -o influxdb=http://localhost:8086/k6 generated/test.js

services:
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6

  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - "3001:3000"
    depends_on:
      - influxdb
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
